<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home | Virtual Checklist</title>
    <meta
      name="description"
      content="A practical tool that flight simmers can have on hand to ensure every stage of a virtual flight is completed correctly."
    />
    <meta name="author" content="Marcelo Severo Patricio" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Kode+Mono:wght@400..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=flight"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/main.js"></script>

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <meta
      property="og:title"
      content="Interactive Virtual Checklists for Flight Simulators"
    />
    <meta
      property="og:description"
      content="A practical tool that flight simmers can have on hand to ensure every stage of a virtual flight is completed correctly."
    />
    <meta
      property="og:image"
      content="https://wdd330-virtualchecklist.onrender.com/ogimage.jpg"
    />
    <meta
      property="og:url"
      content="https://wdd330-virtualchecklist.onrender.com/"
    />
  </head>
  <body>
    <header id="main-header"></header>
    <main class="home-page">
      <div class="hero">
        <picture>
          <source srcset="images/hero-large.webp" media="(min-width: 768px)" />
          <source srcset="images/hero-medium.webp" media="(min-width: 480px)" />
          <img
            src="images/hero-small.webp"
            alt="Porto Alegre Skyline"
            width="480"
            height="240"
          />
        </picture>
        <a href="/checklist/index.html" class="cta buttons buttonsRounded"
          >Start a Flight!</a
        >
      </div>
      <h1>Home</h1>

      <div class="welcomeLastflight">
        <!-- WELCOME SECTION -->
        <section class="welcomeSection">
          <h2 class="cardTitle">Welcome</h2>
          <div class="welcomeDiv cards">
            <p>Welcome to the Virtual Checklist pilot!</p>
            <p>Take your seat on the cockpit and have a good flight!</p>
          </div>
        </section>
        <!-- LASTFLIGHT SECTION -->
        <section class="lastflightSection">
          <h2 class="cardTitle">Last Flight</h2>
          <div class="lastflightDiv cards">
            <div id="lasflight-img" class="lastflightImg"><div></div></div>
            <div class="lastflightAircraft">
              <p class="lastflightP">
                Aircraft: <span id="last-aircraft"></span>
              </p>
              <p>Date: <span id="last-date"></span></p>
            </div>
          </div>
        </section>
      </div>
      <!-- CHOOSE SECTION -->
      <div class="choose">
        <h2 class="cardTitle">Choose your Next Flight</h2>
        <div id="choose-div" class="chooseDiv cards"></div>
      </div>
    </main>
    <footer id="main-footer"></footer>
  </body>
</html>

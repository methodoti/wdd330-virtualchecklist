<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aircraft Checklists | Virtual Checklist</title>
    <meta
      name="description"
      content="Interactive flight procedures from pre-flight to shutdown. Select your aircraft and ensure a perfect virtual flight."
    />
    <meta name="author" content="Marcelo Severo Patricio" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Kode+Mono:wght@400..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=check,flight,keyboard_arrow_down,keyboard_arrow_up"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="/js/checklist.js"></script>
  </head>
  <body>
    <header id="main-header"></header>
    <main class="checklist-page">
      <div class="main-top-bar">
        <div class="flight-progress-text">
          <span id="flight-progress-display">Flight Progress: 0%</span>
        </div>

        <div class="top-bar-icons">
          <button
            id="toggle-settings-btn"
            class="top-bar-btn"
            aria-label="Settings"
          >
            <img src="/images/icons/gear.svg" class="top-icon" alt="Settings" />
          </button>
          <button id="toggle-top-btn" class="top-bar-btn" aria-label="Go Top">
            <img src="/images/icons/to-top.svg" class="top-icon" alt="Go Top" />
          </button>
          <button
            id="toggle-expand-btn"
            class="top-bar-btn"
            aria-label="Expand All"
          >
            <img
              src="/images/icons/double-down.svg"
              class="top-icon"
              alt="Expand All"
            />
          </button>
          <button
            id="toggle-colapse-btn"
            class="top-bar-btn"
            aria-label="Colapse All"
          >
            <img
              src="/images/icons/double-up.svg"
              class="top-icon"
              alt="Colapse All"
            />
          </button>
        </div>
      </div>

      <div class="top-api-bar">
        <button
          id="simbrief-btn"
          class="api-bar-btn"
          aria-label="Configure SimBrief"
        ></button>

        <div id="simbrief-config-panel" class="api-config-panel">
          <input
            type="text"
            id="simbrief-id-input"
            placeholder="Simbrief Pilot ID"
            aria-label="Simbrief Pilot ID"
          />
          <button id="save-simbrief-btn" class="api-save-btn">Load Plan</button>
        </div>

        <div class="flight-status-display">
          <span id="top-flight-info">No Flight Plan</span>
        </div>
      </div>

      <h1>Checklist</h1>
      <label
        >Select aircarft
        <select class="buttons" id="select-aircraft">
          <option value="">Choose a plane...</option>
        </select></label
      >

      <div class="chekclistMainDiv">
        <div id="category-section" class="categorySection"></div>
      </div>

      <div class="bottom-api-bar">
        <div class="bottom-bar-content">
          <div id="bottom-flight-details" class="flight-details-text"></div>
        </div>

        <div class="bottom-bar-header" id="toggle-bottom-bar">
          <div></div>
          <span id="bottom-bar-summary">No Flight Plan</span>
          <span class="categoryButton"></span>
        </div>
      </div>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>

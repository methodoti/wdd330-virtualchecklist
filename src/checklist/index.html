<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aircraft Checklists | Virtual Checklist</title>
    <meta
      name="description"
      content="Interactive flight procedures from pre-flight to shutdown. Select your aircraft and ensure a perfect virtual flight."
    />
    <meta name="author" content="Marcelo Severo Patricio" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Kode+Mono:wght@400..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=check,flight,keyboard_arrow_down,keyboard_arrow_up"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="/js/checklist.js"></script>
  </head>
  <body>
    <header id="main-header"></header>
    <main class="checklist-page">
      <h1>Checklist</h1>
      <label
        >Select aircarft
        <select class="buttons" id="select-aircraft">
          <option value="">Choose a plane...</option>
        </select></label
      >

      <div class="chekclistMainDiv">
        <div id="category-section" class="categorySection">
          <!--</div>-->
          <!-- A MÁGICA COMEÇA AQUI, ESTA É A DIV ALVO, A PARTIR DAQUI, SERÁ GERADO DINAMICAMENTE -->

          <!-- ======= CHECKLIST CATEGORY (exemplo, tudo isto vai sumir para ser preenchido dinamicamente) =========== -->
          <h2 class="aircraftName"></h2>

          <button class="resetAll buttons buttonsRounded">Reset All</button>

          <div
            id="category-title"
            class="categoryTitleDiv cardTitle"
            aria-label="open and close"
          >
            <h3 class="cardTitle">Pre Flight</h3>
            <span id="category-button" class="categoryButton"></span>
          </div>

          <div id="checklist-div" class="checklistDiv cards show">
            <div class="checklistItem type-checkpoint">
              <div class="check">
                <div class="checkIcon checked"></div>
              </div>
              <div class="item type-checkpoint checked">
                <span class="task">BATERY</span>
                <div class="dot checked"></div>
                <span class="action">GUARD CLOSED</span>
              </div>
            </div>

            <div class="checklistItem type-checkpoint">
              <div class="check">
                <div class="checkIcon"></div>
              </div>
              <div class="item type-checkpoint">
                <span class="task">RTE PAGE 1/2</span>
                <div class="dot"></div>
                <span class="action">SET</span>
              </div>
            </div>

            <div class="checklistItem type-info">
              <div class="check">
                <div class="checkIcon"></div>
              </div>
              <div class="item type-info">
                <span class="task">ORIGIN AND DEST</span>
                <div class="dot"></div>
                <span class="action">SET</span>
              </div>
            </div>

            <div class="checklistItem type-subtitle">
              <div class="item type-subtitle">
                <span class="task">Passing Ta (Transition-Altitude)</span>
              </div>
            </div>

            <div class="checklistItem type-sim-action">
              <div class="check">
                <div class="checkIcon"></div>
              </div>
              <div class="item type-sim-action">
                <span class="task">(PREFLIGHT CHECKLIST)</span>
              </div>
            </div>
            <div class="resetDiv">
              <button class="reset buttons buttonsRounded">Reset</button>
            </div>
          </div>
          <button class="resetAll buttons buttonsRounded">Reset All</button>
          <!-- ======= fim da CHECKLIST CATEGORY =========== -->
        </div>
      </div>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
